services:
  - type: web
    name: followers-boost
    runtime: node
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma db push && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:/var/data/prod.db
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: JAP_API_KEY
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
    disk:
      name: db-data
      mountPath: /var/data
      sizeGB: 1
